services:
  - type: web
    name: soseki-api
    runtime: go
    rootDir: api
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/server
    startCommand: ./app
    envVars:
      - key: DATABASE_URL
        sync: false  # Render ダッシュボードで設定
      - key: ALLOWED_ORIGIN
        sync: false  # デプロイ後に Vercel の URL を設定
      - key: PORT
        value: "8080"
