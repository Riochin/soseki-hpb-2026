<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shooting Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* soseki-20th/app/globals.css のセマンティック色と揃える */
    :root {
      --bg: #0c0a08;
      --surface: #141008;
      --accent: #facc15;
      --text: #e8dcc8;
      --text-dim: #a8a29e;
      --correct: #aadd00;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 860px;
      padding: 16px;
      position: relative;
      z-index: 1;
      min-height: 100svh;
      justify-content: center;
    }
    .screen.active { display: flex; }

    .title {
      font-size: 2.4rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .title span { color: var(--accent); }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.7;
    }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 48px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      clip-path: none;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    /* Game screen layout */
    #screen-game {
      gap: 0;
      padding: 4px 8px 8px;
      justify-content: flex-start;
      min-height: 0;
    }

    #canvas-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #game-canvas {
      display: block;
      transform-origin: top center;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0d0d00;
    }

    /* Touch controls */
    .touch-controls {
      display: flex;
      gap: 32px;
      justify-content: center;
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      z-index: 100;
    }

    .touch-btn {
      width: 72px;
      height: 72px;
      background: rgba(245,196,0,0.15);
      border: 2px solid rgba(245,196,0,0.4);
      border-radius: 50%;
      color: var(--accent);
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s;
    }
    .touch-btn:active,
    .touch-btn.pressed {
      background: rgba(245,196,0,0.35);
    }

    /* Result screen */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .result-card.highlight { border-color: var(--accent); background: rgba(245,196,0,0.08); }
    .result-value { font-size: 2.6rem; font-weight: bold; color: var(--accent); }
    .result-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
    .result-rank { font-size: 3.5rem; }

    .btn-row { display: flex; gap: 16px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <!-- Start Screen -->
  <div class="screen active" id="screen-start">
    <div class="title">インファイト<span>花京院</span></div>
    <div class="subtitle">
      いける‼️いける‼️いける‼️ロー‼️ロー‼️ロー‼️ロー‼️<br>
    </div>
    <div style="font-size:0.75rem; color:var(--text-dim); letter-spacing:0.08em;">原案: ANNA &nbsp;／&nbsp; 開発: マルハット &nbsp;／&nbsp; 絵: ぬま</div>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <!-- Game Screen -->
  <div class="screen" id="screen-game">
    <div id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
      <div class="touch-controls">
        <button class="touch-btn" id="btn-up" aria-label="上へ移動">▲</button>
        <button class="touch-btn" id="btn-down" aria-label="下へ移動">▼</button>
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="title">RESULT<span>!</span></div>
    <div class="result-grid">
      <div class="result-card highlight">
        <div class="result-value" id="res-kill">0</div>
        <div class="result-label">撃破数</div>
      </div>
      <div class="result-card">
        <div class="result-value" id="res-score">0</div>
        <div class="result-label">Score</div>
      </div>
      <div class="result-card">
        <div class="result-value" id="res-time">0s</div>
        <div class="result-label">生存時間</div>
      </div>
      <div class="result-card">
        <div class="result-value" id="res-hp">0</div>
        <div class="result-label">残HP</div>
      </div>
    </div>
    <div class="result-card" style="width:100%; flex-direction:row; gap:16px; justify-content:center;">
      <div class="result-rank" id="res-rank">C</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="retry-btn">RETRY</button>
      <button class="btn btn-ghost" id="menu-btn">MENU</button>
    </div>
  </div>

  <script>
    // ── Images ────────────────────────────────────────────────────────────
    const playerImg  = new Image(); playerImg.src  = 'player.png';
    const playerImg2 = new Image(); playerImg2.src = 'player2.png';
    const enemyImg   = new Image(); enemyImg.src   = 'enemy.png';
    const enemyImg2  = new Image(); enemyImg2.src  = 'enemy2.png';
    const bulletImg = new Image(); bulletImg.src = 'bullet.png';
    const itemImg   = new Image(); itemImg.src   = 'item.png';
    const bgImg     = new Image(); bgImg.src     = 'bg.png';

    // ── Canvas setup ───────────────────────────────────────────────────────
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    const LANES = 3;
    const SCALE = 2;                 // logical resolution multiplier
    const CANVAS_W = 360 * SCALE;   // portrait: 720 logical px wide
    const CANVAS_H = 500 * SCALE;   // portrait: 1000 logical px tall
    const HUD_H    =  48 * SCALE;
    const LANE_H = (CANVAS_H - HUD_H) / LANES;

    // ── High-DPI (Retina) support ──────────────────────────────────────────
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = CANVAS_W * dpr;
    canvas.height = CANVAS_H * dpr;
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // ── Responsive scaling ─────────────────────────────────────────────────
    const TOUCH_BTN_H = 112; // fixed touch buttons area (px) reserved at bottom
    function fitCanvas() {
      const availW = window.innerWidth - 8;
      const availH = window.innerHeight - TOUCH_BTN_H - 8;
      const scale  = Math.min(availW / CANVAS_W, availH / CANVAS_H, 1);
      canvas.style.width  = CANVAS_W + 'px';
      canvas.style.height = CANVAS_H + 'px';
      canvas.style.transform = `scale(${scale})`;
      document.getElementById('canvas-wrapper').style.height =
        Math.ceil(CANVAS_H * scale) + 'px';
    }
    window.addEventListener('resize', fitCanvas);
    fitCanvas();

    function laneY(lane) {
      return HUD_H + lane * LANE_H + LANE_H / 2;
    }

    // ── Draw helpers ───────────────────────────────────────────────────────
    function drawBgCover(img, dx, dy, dw, dh) {
      if (!img.naturalWidth) return;
      const imgR = img.naturalWidth / img.naturalHeight;
      const dstR = dw / dh;
      let sx, sy, sw, sh;
      if (imgR > dstR) {
        sh = img.naturalHeight; sw = sh * dstR;
        sx = (img.naturalWidth - sw) / 2; sy = 0;
      } else {
        sw = img.naturalWidth; sh = sw / dstR;
        sx = 0; sy = (img.naturalHeight - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    const PLAYER_W = 120 * SCALE;
    const PLAYER_H =  80 * SCALE;

    function drawPlayer(x, lane) {
      const y = laneY(lane);
      const img = state.walkFrame === 0 ? playerImg : playerImg2;
      ctx.drawImage(img, x - PLAYER_W / 2, y - PLAYER_H / 2, PLAYER_W, PLAYER_H);
    }

    const ENEMY_W = 100 * SCALE;
    const ENEMY_H =  67 * SCALE;

    function drawEnemy(x, lane, hp, maxHp) {
      const y = laneY(lane);
      const img = state.walkFrame === 0 ? enemyImg : enemyImg2;
      ctx.drawImage(img, x - ENEMY_W / 2, y - ENEMY_H / 2, ENEMY_W, ENEMY_H);
      const totalW = 80*SCALE;
      const pipCount = maxHp;
      const pipGap = Math.min(2*SCALE, totalW / pipCount * 0.2);
      const pipW = (totalW - pipGap * (pipCount - 1)) / pipCount;
      let px = x - totalW / 2;
      for (let i = 0; i < pipCount; i++) {
        ctx.fillStyle = i < hp ? '#ffcc00' : '#333';
        ctx.fillRect(px, y - ENEMY_H / 2 - 6*SCALE, pipW, 3*SCALE);
        px += pipW + pipGap;
      }
    }

    function drawItem(x, lane, lifeRatio) {
      const y = laneY(lane);
      const r = 14 * SCALE;
      ctx.save();
      ctx.globalAlpha = 0.4 + lifeRatio * 0.6;
      ctx.drawImage(itemImg, x - r, y - r, r * 2, r * 2);
      ctx.restore();
    }

    function drawBullet(x, lane) {
      const y = laneY(lane);
      ctx.drawImage(bulletImg, x, y - 6*SCALE, 20*SCALE, 12*SCALE);
    }

    // ── State ──────────────────────────────────────────────────────────────
    const MAX_HP = 5;
    const MAX_LEVEL = 6;
    function levelToInterval(lv) { return 300 - (lv - 1) * 32; }

    let state;

    function initState() {
      state = {
        started: false,
        over: false,
        playerLane: 1,
        hp: MAX_HP,
        level: 1,
        score: 0,
        kills: 0,
        elapsed: 0,
        lastTime: 0,
        enemies: [],
        bullets: [],
        items: [],
        spawnTimer: 0,
        spawnInterval: 2000,
        bulletTimer: 0,
        bulletInterval: levelToInterval(1),
        laneMoveCooldown: 0,
        input: { up: false, down: false },
        hitFlash: 0,
        levelFlash: 0,
        walkTimer: 0,
        walkFrame: 0,
      };
    }

    // ── Game loop ──────────────────────────────────────────────────────────
    let rafId = null;

    function gameLoop(timestamp) {
      if (!state.started || state.over) return;

      const dt = state.lastTime ? timestamp - state.lastTime : 16;
      state.lastTime = timestamp;

      update(dt);
      render();

      rafId = requestAnimationFrame(gameLoop);
    }

    function update(dt) {
      state.elapsed += dt / 1000;

      state.laneMoveCooldown = Math.max(0, state.laneMoveCooldown - dt);
      if (state.laneMoveCooldown === 0) {
        if (state.input.up && state.playerLane > 0) {
          state.playerLane--;
          state.laneMoveCooldown = 150;
        } else if (state.input.down && state.playerLane < LANES - 1) {
          state.playerLane++;
          state.laneMoveCooldown = 150;
        }
      }

      state.bulletTimer += dt;
      if (state.bulletTimer >= state.bulletInterval) {
        state.bulletTimer = 0;
        state.bullets.push({ x: 82*SCALE, lane: state.playerLane });
      }

      const bSpeed = CANVAS_W * 0.8 / 1000 * dt;
      state.bullets = state.bullets.filter(b => {
        b.x += bSpeed;
        return b.x < CANVAS_W + 20*SCALE;
      });

      state.spawnTimer += dt;
      const difficulty = Math.min(state.elapsed / 30, 1);
      state.spawnInterval = 2000 - difficulty * 1200;
      if (state.spawnTimer >= state.spawnInterval) {
        state.spawnTimer = 0;
        const lane = Math.floor(Math.random() * LANES);
        const enemyHp = 5 + Math.floor(state.score / 500);
        state.enemies.push({ x: CANVAS_W + 30*SCALE, lane, baseSpeed: (100 + difficulty * 88) * SCALE, hp: enemyHp, maxHp: enemyHp });
      }

      state.enemies = state.enemies.filter(e => {
        e.x -= e.baseSpeed * dt / 1000;
        return e.x > -60*SCALE;
      });

      const BULLET_HIT_X = 18 * SCALE;
      const BULLET_HIT_Y = LANE_H * 0.45;
      const ENEMY_HALF_W = 40 * SCALE;
      for (let bi = state.bullets.length - 1; bi >= 0; bi--) {
        const b = state.bullets[bi];
        const bx = b.x + 10 * SCALE, by = laneY(b.lane);
        for (let ei = state.enemies.length - 1; ei >= 0; ei--) {
          const e = state.enemies[ei];
          const ex = e.x, ey = laneY(e.lane);
          if (Math.abs(bx - ex) < BULLET_HIT_X + ENEMY_HALF_W && Math.abs(by - ey) < BULLET_HIT_Y) {
            state.bullets.splice(bi, 1);
            e.hp--;
            if (e.hp <= 0) {
              state.enemies.splice(ei, 1);
              state.kills++;
              state.score += 10;
              if (state.level < MAX_LEVEL && Math.random() < 0.20) {
                state.items.push({ x: e.x, lane: e.lane, life: 5000, delay: 500 });
              }
            }
            break;
          }
        }
      }

      const PLAYER_X = 54 * SCALE;
      const PLAYER_HIT_X = 36 * SCALE;
      const PLAYER_HIT_Y = LANE_H * 0.45;
      const ENEMY_HALF_W2 = 40 * SCALE;
      for (let ei = state.enemies.length - 1; ei >= 0; ei--) {
        const e = state.enemies[ei];
        const px = PLAYER_X, py = laneY(state.playerLane);
        const ex = e.x,      ey = laneY(e.lane);
        if (Math.abs(ex - px) < PLAYER_HIT_X + ENEMY_HALF_W2 && Math.abs(ey - py) < PLAYER_HIT_Y) {
          state.enemies.splice(ei, 1);
          state.hp--;
          state.hitFlash = 8;
          if (state.hp <= 0) {
            endGame();
            return;
          }
        }
      }

      const ITEM_R = 14 * SCALE;
      const PLAYER_PICKUP_X = 54 * SCALE;
      state.items = state.items.filter(item => {
        item.x -= 60*SCALE * dt / 1000;
        item.life -= dt;
        if (item.delay > 0) { item.delay -= dt; return true; }
        if (item.life <= 0 || item.x < -ITEM_R) return false;
        const ix = item.x, iy = laneY(item.lane);
        const py = laneY(state.playerLane);
        if (
          state.level < MAX_LEVEL &&
          Math.abs(ix - PLAYER_PICKUP_X) < ITEM_R + 36*SCALE &&
          Math.abs(iy - py) < LANE_H * 0.45
        ) {
          state.level++;
          state.bulletInterval = levelToInterval(state.level);
          state.levelFlash = 40;
          return false;
        }
        return true;
      });

      state.score = state.kills * 10 + Math.floor(state.elapsed);

      if (state.hitFlash > 0) state.hitFlash--;
      if (state.levelFlash > 0) state.levelFlash--;

      state.walkTimer += dt;
      if (state.walkTimer >= 250) {
        state.walkTimer = 0;
        state.walkFrame = 1 - state.walkFrame;
      }
    }

    function render() {
      ctx.fillStyle = state.hitFlash > 0 ? '#200000' : '#0d0d00';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      drawBgCover(bgImg, 0, HUD_H, CANVAS_W, CANVAS_H - HUD_H);

      ctx.strokeStyle = 'rgba(245,196,0,0.06)';
      ctx.lineWidth = SCALE;
      for (let i = 0; i <= LANES; i++) {
        const y = HUD_H + i * LANE_H;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CANVAS_W, y);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(0,255,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(82*SCALE, HUD_H);
      ctx.lineTo(82*SCALE, CANVAS_H);
      ctx.stroke();

      for (const e of state.enemies) drawEnemy(e.x, e.lane, e.hp, e.maxHp);
      for (const item of state.items) drawItem(item.x, item.lane, item.life / 5000);
      for (const b of state.bullets) drawBullet(b.x, b.lane);

      drawPlayer(54*SCALE, state.playerLane);

      renderHUD();
    }

    function renderHUD() {
      ctx.fillStyle = '#111100';
      ctx.fillRect(0, 0, CANVAS_W, HUD_H);
      ctx.strokeStyle = 'rgba(245,196,0,0.15)';
      ctx.lineWidth = SCALE;
      ctx.beginPath();
      ctx.moveTo(0, HUD_H);
      ctx.lineTo(CANVAS_W, HUD_H);
      ctx.stroke();

      const heartSize  = 22 * SCALE;
      const heartGap   =  6 * SCALE;
      const heartStartX = 12 * SCALE;
      for (let i = 0; i < MAX_HP; i++) {
        drawHeart(heartStartX + i * (heartSize + heartGap), 13*SCALE, heartSize, i < state.hp);
      }

      const lvColor = state.levelFlash > 0 ? '#00ffcc' : '#aaa';
      ctx.fillStyle = lvColor;
      ctx.font = `bold ${12*SCALE}px "Courier New", monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(`LV ${state.level}`, CANVAS_W / 2, 18*SCALE);
      const barW = 72*SCALE, barH = 5*SCALE;
      const barX = CANVAS_W / 2 - barW / 2, barY = 25*SCALE;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = state.levelFlash > 0 ? '#00ffcc' : '#f5c400';
      ctx.fillRect(barX, barY, barW * (state.level / MAX_LEVEL), barH);
      ctx.textAlign = 'left';

      ctx.fillStyle = '#f5c400';
      ctx.font = `bold ${15*SCALE}px "Courier New", monospace`;
      ctx.textAlign = 'right';
      ctx.fillText(`SCORE: ${state.score}`, CANVAS_W - 12*SCALE, 30*SCALE);
      ctx.textAlign = 'left';

      ctx.fillStyle = '#888';
      ctx.font = `${12*SCALE}px "Courier New", monospace`;
      ctx.textAlign = 'right';
      ctx.fillText(`${Math.floor(state.elapsed)}s`, CANVAS_W - 12*SCALE, 44*SCALE);
      ctx.textAlign = 'left';
    }

    function drawHeart(x, y, size, filled) {
      ctx.save();
      ctx.translate(x + size / 2, y + size / 2);
      const s = size / 2;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.4);
      ctx.bezierCurveTo(-s * 1.1, -s * 0.5, -s * 1.1, -s * 1.4, 0, -s * 0.7);
      ctx.bezierCurveTo(s * 1.1, -s * 1.4, s * 1.1, -s * 0.5, 0, s * 0.4);
      ctx.closePath();
      ctx.fillStyle = filled ? '#ff6699' : '#333';
      ctx.fill();
      if (filled) {
        ctx.strokeStyle = '#ff99bb';
        ctx.lineWidth = SCALE;
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── Start / End ────────────────────────────────────────────────────────
    function startGame() {
      initState();
      showScreen('screen-game');
      fitCanvas();
      state.started = true;
      state.lastTime = 0;
      rafId = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      state.over = true;
      cancelAnimationFrame(rafId);
      showResult();
    }

    function showResult() {
      const kills = state.kills;
      let rank;
      if (kills >= 50) rank = 'S';
      else if (kills >= 30) rank = 'A';
      else if (kills >= 15) rank = 'B';
      else if (kills >= 5) rank = 'C';
      else rank = 'D';

      document.getElementById('res-kill').textContent = kills;
      document.getElementById('res-score').textContent = state.score;
      document.getElementById('res-time').textContent = `${Math.floor(state.elapsed)}s`;
      document.getElementById('res-hp').textContent = state.hp;
      document.getElementById('res-rank').textContent = rank;

      showScreen('screen-result');

      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'MINI_GAME_RESULT',
          payload: {
            gameType: 'shooting',
            rank: rank,
            score: state.score,
          }
        }, '*');
      }
    }

    // ── Screen helpers ─────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Keyboard input ─────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      const gameActive   = document.getElementById('screen-game').classList.contains('active');
      const startActive  = document.getElementById('screen-start').classList.contains('active');
      const resultActive = document.getElementById('screen-result').classList.contains('active');

      if (!gameActive) {
        if (e.key === 'Enter') {
          if (startActive || resultActive) startGame();
        }
        return;
      }

      if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') { e.preventDefault(); state.input.up   = true; }
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); state.input.down = true; }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') state.input.up   = false;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') state.input.down = false;
    });

    // ── Touch controls ─────────────────────────────────────────────────────
    function bindTouchBtn(id, direction) {
      const btn = document.getElementById(id);

      function start(e) {
        e.preventDefault();
        btn.classList.add('pressed');
        state.input[direction] = true;
      }
      function stop(e) {
        e.preventDefault();
        btn.classList.remove('pressed');
        state.input[direction] = false;
      }

      btn.addEventListener('touchstart', start, { passive: false });
      btn.addEventListener('touchend', stop, { passive: false });
      btn.addEventListener('touchcancel', stop, { passive: false });
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', stop);
      btn.addEventListener('mouseleave', stop);
    }

    bindTouchBtn('btn-up', 'up');
    bindTouchBtn('btn-down', 'down');

    // ── UI buttons ─────────────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => startGame());
    document.getElementById('retry-btn').addEventListener('click', () => startGame());
    document.getElementById('menu-btn').addEventListener('click', () => {
      cancelAnimationFrame(rafId);
      showScreen('screen-start');
    });
  </script>
</body>
</html>
