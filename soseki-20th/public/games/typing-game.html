<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #161600;
      --surface2: #101000;
      --accent: #f5c400;
      --accent2: #3a3000;
      --text: #eaeaea;
      --text-dim: #888;
      --correct: #aadd00;
      --wrong: #ff4444;
      --pending: #4a4500;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245, 196, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 196, 0, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 196, 0, 0.10) 0%, transparent 70%);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .bg-glow:nth-child(2) {
      background: radial-gradient(circle, rgba(170, 221, 0, 0.06) 0%, transparent 70%);
      animation-delay: -4s;
      right: -200px;
      bottom: -200px;
    }

    @keyframes float {
      0%, 100% { transform: translate(-10%, -10%); }
      50% { transform: translate(10%, 10%); }
    }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 800px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .screen.active {
      display: flex;
    }

    /* Title */
    .title {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .title span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 1rem;
      text-align: center;
      line-height: 1.6;
    }

    /* Buttons */
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 48px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.85;
      transform: scale(1.03);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      clip-path: none;
    }

    .btn-ghost:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Difficulty selector */
    .difficulty-select {
      display: flex;
      gap: 12px;
    }

    .diff-btn {
      background: var(--surface);
      border: 2px solid transparent;
      color: var(--text-dim);
      padding: 10px 24px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 4px;
    }

    .diff-btn:hover,
    .diff-btn.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .diff-btn.active {
      background: rgba(245, 196, 0, 0.12);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 40px;
      background: var(--surface);
      padding: 16px 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      width: 100%;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent);
      min-width: 60px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #timer-value {
      color: var(--correct);
    }

    #timer-value.warning {
      color: #ffaa00;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    #timer-value.danger {
      color: var(--accent);
      animation: pulse 0.3s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 1; }
      to { opacity: 0.5; }
    }

    /* Word display */
    .word-display {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 32px 32px;
      width: 100%;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .phrase-japanese {
      font-size: 1rem;
      color: var(--text-dim);
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      letter-spacing: 0.08em;
    }

    .phrase-romaji {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0;
    }

    .word-display::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    .char {
      font-size: 2rem;
      color: #555;
      transition: color 0.08s;
      font-family: 'Courier New', monospace;
      white-space: pre;
    }

    .char.correct {
      color: var(--correct);
    }

    .char.wrong {
      color: var(--wrong);
      border-bottom: 2px solid var(--wrong);
    }

    .char.current {
      color: #aaa;
      border-bottom: 2px solid var(--accent);
    }

    /* Input space */
    .input-area {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      border-bottom: 2px solid rgba(255,255,255,0.15);
      padding: 10px 4px;
      transition: border-color 0.2s;
    }

    .input-area.error {
      border-color: var(--wrong);
    }

    .input-area.success {
      border-color: var(--correct);
    }

    .input-typed {
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      color: var(--text);
      min-width: 2px;
      min-height: 1.4em;
      letter-spacing: 0.05em;
    }

    .input-cursor {
      display: inline-block;
      width: 2px;
      height: 1.4em;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: middle;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .input-hint {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
    }

    /* Combo display */
    .combo-display {
      min-height: 28px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      color: transparent;
      transition: color 0.2s;
    }

    .combo-display.combo-active {
      color: #ffcc00;
      animation: combo-pop 0.3s ease;
    }

    @keyframes combo-pop {
      0% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: var(--surface);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--correct), var(--accent));
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Result screen */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .result-card.highlight {
      border-color: var(--accent);
      background: rgba(245, 196, 0, 0.08);
    }

    .result-value {
      font-size: 3rem;
      font-weight: bold;
      color: var(--accent);
    }

    .result-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .result-rank {
      font-size: 4rem;
    }

    .btn-row {
      display: flex;
      gap: 16px;
    }

    /* Flicker effect on start */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .flicker {
      animation: flicker 0.15s steps(1) 3;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow"></div>

  <!-- Start Screen -->
  <div class="screen active" id="screen-start">
    <div class="title">アクメ漱石名言タイピングゲーム</div>
    <div class="subtitle">
      まぁ、余裕っすね。<br>
    </div>
    <div class="difficulty-select">
      <button class="diff-btn active" data-time="30">30秒</button>
      <button class="diff-btn" data-time="60">60秒</button>
      <button class="diff-btn" data-time="120">120秒</button>
    </div>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <!-- Game Screen -->
  <div class="screen" id="screen-game">
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="timer-value">60</div>
        <div class="stat-label">Time</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="correct-value">0</div>
        <div class="stat-label">正解数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="acc-value">100</div>
        <div class="stat-label">Acc %</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="score-value">0</div>
        <div class="stat-label">Score</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="combo-display" id="combo-display"></div>

    <div class="word-display" id="word-display"></div>

    <div class="input-area" id="input-area">
      <span class="input-typed" id="input-typed"></span><span class="input-cursor"></span>
      <span class="input-hint">Enter → スキップ</span>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="title">RESULT<span>!</span></div>
    <div class="result-grid">
      <div class="result-card highlight">
        <div class="result-value" id="res-correct">0</div>
        <div class="result-label">正解数</div>
      </div>
      <div class="result-card">
        <div class="result-value" id="res-acc">0</div>
        <div class="result-label">Accuracy %</div>
      </div>
      <div class="result-card">
        <div class="result-value" id="res-score">0</div>
        <div class="result-label">Score</div>
      </div>
      <div class="result-card">
        <div class="result-value" id="res-combo">0</div>
        <div class="result-label">Max Combo</div>
      </div>
    </div>
    <div class="result-card" style="width:100%; flex-direction:row; gap:16px; justify-content:center;">
      <div class="result-rank" id="res-rank">B</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="retry-btn">RETRY</button>
      <button class="btn btn-ghost" id="menu-btn">MENU</button>
    </div>
  </div>

  <script>
    // ── Phrase pool ────────────────────────────────────────────────────────
    // display: 画面に表示する日本語テキスト
    // romaji:  実際にタイプするローマ字（ーは-で表記）
    const PHRASES = [
      { display: 'ロー！ロー！ロー！ロー！',                   romaji: 'ro-!ro-!ro-!ro-!' },
      { display: 'easy',                                         romaji: 'easy' },
      { display: 'easy easy',                                   romaji: 'easy easy' },
      { display: '今のは俺が悪いわ',                           romaji: 'imanohaoregawaruiwa' },
      { display: 'ぶっちゃけ俺の締まりよくね！？',             romaji: 'bucchakeorenoshimariyokune!?' },
      { display: 'ア○ル舐めたーい！！',                        romaji: 'anarunameta-i!!' },
      { display: 'ゴリラさんもア○ル舐めたいですよね？',        romaji: 'gorirasannmoanarunametaidesuyone?' },
      { display: '今のはお前が悪いよ？',                       romaji: 'imanohaomaegawaruiyo?' },
      { display: 'うまーーーーーーーーい！！',                  romaji: 'uma--------i!!' },
      { display: 'まぁ、余裕っすね',                           romaji: 'maa,yoyuussune' },
    ];

    // ── Romaji alternatives ────────────────────────────────────────────────
    // [canonical, ...alternatives] の形式
    const ROMAJI_ALTS = [
      ['shi', 'si'],
      ['chi', 'ti'],
      ['tsu', 'tu'],
      ['sha', 'sya'],
      ['sho', 'syo'],
      ['shu', 'syu'],
      ['cha', 'cya', 'tya'],
      ['cho', 'cyo', 'tyo'],
      ['chu', 'cyu', 'tyu'],
      ['fu',  'hu'],
      ['ji',  'zi'],
      ['ja',  'jya', 'zya'],
      ['jo',  'jyo', 'zyo'],
      ['ju',  'jyu', 'zyu'],
      ['dzu', 'du'],
    ];

    // ── Romaji match engine ────────────────────────────────────────────────
    // typed した文字列が canonical ローマ字にどこまで一致するかを返す
    // { consumed: canonicalの消費文字数, valid: 有効な入力か }
    // canonical 中の `-` は長音符（ー）を表し、`-` または直前の母音で入力できる
    const VOWELS = 'aeiou';
    function matchRomaji(typed, canonical, ti = 0, ci = 0) {
      if (ti >= typed.length) return { consumed: ci, valid: true };
      if (ci >= canonical.length) return { consumed: ci, valid: false };

      const typedRem  = typed.slice(ti);
      const canonRem  = canonical.slice(ci);

      // 長音符 `-` の処理: `-` または直前の母音を受け付ける
      if (canonRem[0] === '-') {
        let prevVowel = '';
        for (let k = ci - 1; k >= 0; k--) {
          if (VOWELS.includes(canonical[k])) { prevVowel = canonical[k]; break; }
        }
        if (typedRem[0] === '-' || (prevVowel && typedRem[0] === prevVowel)) {
          return matchRomaji(typed, canonical, ti + 1, ci + 1);
        }
        return { consumed: ci, valid: false };
      }

      // alternatives チェック
      for (const [canon, ...alts] of ROMAJI_ALTS) {
        if (canonRem.startsWith(canon)) {
          for (const alt of alts) {
            if (typedRem.startsWith(alt)) {
              // alternative 全体が一致 → canonical の canon 分を消費
              return matchRomaji(typed, canonical, ti + alt.length, ci + canon.length);
            }
            if (alt.startsWith(typedRem)) {
              // alternative の途中まで typed → まだ有効
              return { consumed: ci, valid: true };
            }
          }
        }
      }

      // 直接一致
      if (typed[ti] === canonical[ci]) {
        return matchRomaji(typed, canonical, ti + 1, ci + 1);
      }

      return { consumed: ci, valid: false };
    }

    // ── State ──────────────────────────────────────────────────────────────
    let state = {
      timeLimit: 30,
      timeLeft: 60,
      timer: null,
      queue: [],       // shuffled phrase queue
      phraseIndex: 0,
      correct: 0,
      missed: 0,
      combo: 0,
      maxCombo: 0,
      score: 0,
      started: false,
      typed: '',
      wrongInput: false,
    };

    // ── Screen helpers ─────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Phrase queue ───────────────────────────────────────────────────────
    function buildQueue() {
      // Shuffle and repeat enough times to last the game
      const result = [];
      while (result.length < 200) {
        result.push(...[...PHRASES].sort(() => Math.random() - 0.5));
      }
      return result;
    }

    // ── Render current phrase ──────────────────────────────────────────────
    function renderPhrase() {
      const phrase = state.queue[state.phraseIndex];
      const wordDisplay = document.getElementById('word-display');
      wordDisplay.innerHTML = '';

      // スキャンラインを再生成（innerHTML リセット後）
      const scanLine = document.createElement('div');
      scanLine.style.cssText = 'position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 3s linear infinite;';
      wordDisplay.appendChild(scanLine);

      // 上段: 日本語フレーズ（参照用）
      const jpEl = document.createElement('div');
      jpEl.className = 'phrase-japanese';
      jpEl.textContent = phrase.display;
      wordDisplay.appendChild(jpEl);

      // 下段: ローマ字（灰色のお手本をなぞる）
      const { consumed } = matchRomaji(state.typed, phrase.romaji);
      const romajiEl = document.createElement('div');
      romajiEl.className = 'phrase-romaji';
      [...phrase.romaji].forEach((ch, i) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = ch;
        if (i < consumed) {
          span.classList.add('correct');
        } else if (i === consumed) {
          span.classList.add(state.wrongInput ? 'wrong' : 'current');
        }
        romajiEl.appendChild(span);
      });

      wordDisplay.appendChild(romajiEl);

      // 入力スペース: 正しく打てた文字のみ表示
      document.getElementById('input-typed').textContent = state.typed;
    }

    // ── Game logic ─────────────────────────────────────────────────────────
    function getSelectedTimeLimit() {
      const activeBtn = document.querySelector('.diff-btn.active');
      if (!activeBtn) return state.timeLimit;
      const selected = Number.parseInt(activeBtn.dataset.time, 10);
      return Number.isNaN(selected) ? state.timeLimit : selected;
    }

    function startGame() {
      state.timeLimit = getSelectedTimeLimit();
      state.queue = buildQueue();
      state.phraseIndex = 0;
      state.correct = 0;
      state.missed = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.score = 0;
      state.timeLeft = state.timeLimit;
      state.started = false;

      renderPhrase();
      updateStats();
      showScreen('screen-game');

      state.typed = '';
      state.wrongInput = false;
      const ia = document.getElementById('input-area');
      ia.classList.remove('error', 'success');
      document.getElementById('input-typed').textContent = '';

      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('combo-display').textContent = '';
    }

    function beginTimer() {
      if (state.timer) clearInterval(state.timer);
      state.timer = setInterval(() => {
        state.timeLeft--;
        updateStats();

        const timerEl = document.getElementById('timer-value');
        timerEl.classList.remove('warning', 'danger');
        if (state.timeLeft <= 10) timerEl.classList.add('danger');
        else if (state.timeLeft <= 20) timerEl.classList.add('warning');

        if (state.timeLeft <= 0) {
          clearInterval(state.timer);
          endGame();
        }
      }, 1000);
    }

    function advancePhrase(isCorrect) {
      if (isCorrect) {
        state.correct++;
        state.combo++;
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        const comboBonus = Math.floor(state.combo / 3);
        state.score += 100 + comboBonus * 20 + Math.floor(state.timeLeft);

        const comboEl = document.getElementById('combo-display');
        if (state.combo >= 3) {
          comboEl.textContent = `${state.combo} COMBO!`;
          comboEl.className = 'combo-display combo-active';
        } else {
          comboEl.textContent = '';
          comboEl.className = 'combo-display';
        }
      } else {
        state.missed++;
        state.combo = 0;
        document.getElementById('combo-display').textContent = '';
        document.getElementById('combo-display').className = 'combo-display';
      }

      state.phraseIndex++;
      state.typed = '';
      state.wrongInput = false;
      const ia = document.getElementById('input-area');
      ia.classList.remove('error', 'success');
      document.getElementById('input-typed').textContent = '';

      renderPhrase();
      updateStats();
    }

    function endGame() {
      clearInterval(state.timer);
      showResult();
    }

    function updateStats() {
      document.getElementById('timer-value').textContent = state.timeLeft;
      document.getElementById('score-value').textContent = state.score;

      const total = state.correct + state.missed;
      const acc = total > 0 ? Math.round((state.correct / total) * 100) : 100;
      document.getElementById('acc-value').textContent = acc;

      document.getElementById('correct-value').textContent = state.correct;

      const progress = (state.timeLimit - state.timeLeft) / state.timeLimit * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showResult() {
      const total = state.correct + state.missed;
      const acc = total > 0 ? Math.round((state.correct / total) * 100) : 100;

      document.getElementById('res-correct').textContent = state.correct;
      document.getElementById('res-acc').textContent = acc;
      document.getElementById('res-score').textContent = state.score;
      document.getElementById('res-combo').textContent = state.maxCombo;

      let rank;
      if (state.correct >= 30 && acc >= 95) rank = 'S';
      else if (state.correct >= 20 && acc >= 90) rank = 'A';
      else if (state.correct >= 12 && acc >= 80) rank = 'B';
      else if (state.correct >= 6) rank = 'C';
      else rank = 'D';

      document.getElementById('res-rank').textContent = rank;

      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'MINI_GAME_RESULT',
          payload: {
            gameType: 'typing',
            rank: rank,
            timeLimit: state.timeLimit,
          }
        }, '*');
      }

      showScreen('screen-result');
    }

    // ── キー入力をすべて keydown で直接監視（IME を完全に無視）─────────────
    document.addEventListener('keydown', (e) => {
      const gameActive   = document.getElementById('screen-game').classList.contains('active');
      const startActive  = document.getElementById('screen-start').classList.contains('active');
      const resultActive = document.getElementById('screen-result').classList.contains('active');

      if (!gameActive) {
        if (e.key === 'Enter') {
          if (startActive)  startGame();
          if (resultActive) startGame();
        }
        return;
      }

      // Ctrl / Meta / Alt は素通し
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (!state.started) return;
        const phrase = state.queue[state.phraseIndex];
        const { consumed, valid } = matchRomaji(state.typed, phrase.romaji);
        advancePhrase(valid && consumed === phrase.romaji.length);
        return;
      }

      // 印字可能な1文字（IME の変換候補キー等は key.length > 1 なので除外される）
      if (e.key.length === 1) {
        e.preventDefault();
        if (!state.started) {
          state.started = true;
          beginTimer();
        }

        const phrase = state.queue[state.phraseIndex];
        const tempTyped = state.typed + e.key;
        const { consumed, valid } = matchRomaji(tempTyped, phrase.romaji);

        if (valid) {
          // 正しいキー: 採用して進む
          state.typed = tempTyped;
          state.wrongInput = false;
          renderPhrase();
          if (consumed === phrase.romaji.length) {
            document.getElementById('input-area').classList.add('success');
            setTimeout(() => advancePhrase(true), 80);
          }
        } else {
          // 間違いキー: typed は変えず、その位置を赤く表示するだけ
          state.wrongInput = true;
          renderPhrase();
        }
      }
    });

    // ── UI Controls ────────────────────────────────────────────────────────
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.timeLimit = parseInt(btn.dataset.time);
      });
    });

    document.getElementById('start-btn').addEventListener('click', () => startGame());
    document.getElementById('retry-btn').addEventListener('click', () => startGame());
    document.getElementById('menu-btn').addEventListener('click', () => showScreen('screen-start'));
  </script>
</body>
</html>
